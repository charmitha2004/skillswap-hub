services:
  postgres:
    image: postgres:16-alpine
    container_name: skillswap-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-charmitha2004}
      POSTGRES_DB: skillswap
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d skillswap"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    ports:
      - "5001:5000"
    environment:
      - PORT=5000
      - CLIENT_URL=http://localhost:3000
      - JWT_SECRET=skillswap-development-secret
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=${DB_PASSWORD:-charmitha2004}
      - DB_NAME=skillswap
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD:-charmitha2004}@postgres:5432/skillswap
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_API_URL=http://localhost:5001/api
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=${DB_PASSWORD:-charmitha2004}
      - DB_NAME=skillswap
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD:-charmitha2004}@postgres:5432/skillswap
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-1.5-flash}
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started

volumes:
  postgres-data:
